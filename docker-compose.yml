services:
  hombre:
    image: ghcr.io/lovethatbrandx/hombre/hombre:latest
    container_name: hombre
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - HONCHO_URL=http://host.docker.internal:8000
      - HONCHO_ENV_PATH=/home/reposed/docker/honcho/.env
      - HONCHO_COMPOSE_DIR=/home/reposed/docker/honcho
    volumes:
      - /home/reposed/docker/honcho/.env:/home/reposed/docker/honcho/.env:ro
      - /home/reposed/docker/honcho:/home/reposed/docker/honcho:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
